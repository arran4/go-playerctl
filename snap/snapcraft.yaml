name: playerctl
base: core22
version: '0.1.0'
summary: Media player command-line controller (Go port)
description: |
  Go port of Playerctl for controlling media players that implement
  the MPRIS D-Bus Interface Specification.

grade: devel
confinement: strict

parts:
  playerctl:
    plugin: go
    source: .
    build-snaps:
      - go
    override-build: |
      craftctl default
      go build -o "$CRAFT_PART_INSTALL/bin/playerctl" ./cmd/playerctl
      go build -o "$CRAFT_PART_INSTALL/bin/playerctld" ./cmd/playerctld
      install -Dm644 data/org.mpris.MediaPlayer2.playerctld.service.in "$CRAFT_PART_INSTALL/usr/share/dbus-1/services/org.mpris.MediaPlayer2.playerctld.service"

slots:
  dbus-svc:
    interface: dbus
    bus: session
    name: org.mpris.MediaPlayer2.playerctld
  system-observe:
    interface: system-observe
  desktop-legacy:
    interface: desktop-legacy

apps:
  playerctl:
    command: bin/playerctl
    plugs: [ network, desktop, desktop-legacy ]

  playerctld:
    command: bin/playerctld
    daemon: simple
    slots: [ dbus-svc ]
    plugs: [ network, desktop, desktop-legacy ]
