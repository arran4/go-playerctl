version: 2

project_name: go-playerctl

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: goplayerctl
    main: ./cmd/goplayerctl
    binary: goplayerctl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - COPYING
      - doc/playerctl-go.1.md
      - data/goplayerctl.bash
      - data/goplayerctl.zsh

snapcrafts:
  - name: goplayerctl
    summary: Media player command-line controller (Go port)
    description: |
      Go port of Playerctl for controlling media players that implement
      the MPRIS D-Bus Interface Specification.
    grade: devel
    confinement: strict
    base: core22
    builds:
      - goplayerctl
    apps:
      goplayerctl:
        command: goplayerctl
        plugs:
          - network
          - desktop
          - desktop-legacy

homebrew_casks:
  -
    repository:
      owner: arran4
      name: homebrew-tap
      branch: "{{.ProjectName}}-{{.Version}}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
