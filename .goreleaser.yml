version: 2

project_name: go-playerctl

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: goplayerctl
    main: ./cmd/goplayerctl
    binary: goplayerctl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: playerctld
    main: ./cmd/playerctld
    binary: playerctld
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - COPYING
      - doc/playerctl-go.1.md
      - data/goplayerctl.bash
      - data/goplayerctl.zsh

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
