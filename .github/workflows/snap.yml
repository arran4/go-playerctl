name: Snap

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    if: false  # Disabled as it hasn't been configured yet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build

      - name: Upload Snap
        uses: actions/upload-artifact@v4
        with:
          name: snap
          path: ${{ steps.build.outputs.snap }}
